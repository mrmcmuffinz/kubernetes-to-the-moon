network:
  version: 2
  renderer: NetworkManager
  ethernets:
    eno1:
      dhcp4: no
      addresses:
        - 192.168.2.198/24
      routes:
        - to: default
          via: 192.168.2.1
          metric: 50
      nameservers:
        addresses:
          - 192.168.2.1
          - 8.8.8.8
    enp6s0f0:
      dhcp4: false
      dhcp6: false
      link-local: []
      accept-ra: false
      optional: true
      networkmanager:
        passthrough:
          ipv4.method: "disabled"
          ipv6.method: "disabled"
    enp6s0f1:
      dhcp4: false
      dhcp6: false
      link-local: []
      accept-ra: false
      optional: true
      networkmanager:
        passthrough:
          ipv4.method: "disabled"
          ipv6.method: "disabled"
    enp6s0f2:
      dhcp4: false
      dhcp6: false
      link-local: []
      accept-ra: false
      optional: true
      networkmanager:
        passthrough:
          ipv4.method: "disabled"
          ipv6.method: "disabled"
    enp6s0f3:
      dhcp4: false
      dhcp6: false
      link-local: []
      accept-ra: false
      optional: true
      networkmanager:
        passthrough:
          ipv4.method: "disabled"
          ipv6.method: "disabled"
  vlans:
    enp6s0f3.100:
      id: 100
      link: enp6s0f3
      dhcp4: false
      dhcp6: false
      link-local: []
      accept-ra: false
  bridges:
    br-vm:
      dhcp4: false
      dhcp6: false
      link-local: []
      interfaces:
        - enp6s0f3.100
      addresses:
        - 192.168.100.2/24
      parameters:
        stp: false
        forward-delay: 0
      optional: true
  wifis:
    NM-e1350b18-e6f9-4473-a49f-1029d2f14bfa:
      match:
        name: "wlp9s0"
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.168.2.60/24
      routes:
        - to: default
          via: 192.168.2.1
          metric: 300
      nameservers:
        addresses:
          - 192.168.2.1
          - 8.8.8.8
      access-points:
        "Muffin_Net_5G":
          auth:
            key-management: "psk"
            password: "redacted"
          networkmanager:
            uuid: "e1350b18-e6f9-4473-a49f-1029d2f14bfa"
            name: "Muffin_Net_5G"
            passthrough:
              wifi-security.auth-alg: "open"
              ipv6.addr-gen-mode: "default"
              ipv6.ip6-privacy: "-1"
              proxy._: ""
      networkmanager:
        uuid: "e1350b18-e6f9-4473-a49f-1029d2f14bfa"
        name: "Muffin_Net_5G"
